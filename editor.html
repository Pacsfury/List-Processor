<!DOCTYPE html>
<html>
    <head>
        <title>List Processor - Editor</title>
        <link rel="icon" type="image/png" href="img/favicon.png">
        <link rel="apple-touch-icon" href="img/favicon.png">
        <meta charset="UTF-8">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="toolbar">
            <button id="btn_home"><img src="img/home.png" alt="Home"></button>
            <input id="inp_name" placeholder="List name">
            
            <!-- Inputs nous per la llista adaptats a la toolbar -->
            <input type="text" id="add-input" placeholder="New task..." style="width: 200px;">
            <button id="add-button" style="width: auto; padding: 0 10px;">Add Item</button>
            
            <button id="btn_dark_mode">🌙</button>
        </div>

        <div class="main-card">
            <ul id="list-items">
                
            </ul>
        </div>

        <script src="script.js"></script>
    </body>
</html>
